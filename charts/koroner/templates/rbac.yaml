{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "koroner.fullname" . }}-manager
  labels:
    {{- include "koroner.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [events, namespaces, secrets]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [pods]
    verbs: [delete, get, list, watch]
  - apiGroups: [""]
    resources: [pods/log]
    verbs: [get]
  - apiGroups: [apps]
    resources: [daemonsets, deployments, statefulsets]
    verbs: [get, list, patch, update, watch]
  - apiGroups: [apps]
    resources: [replicasets]
    verbs: [get, list, watch]
  - apiGroups: [batch]
    resources: [cronjobs, jobs]
    verbs: [get, list, watch]
  - apiGroups: [koroner.pez.sh]
    resources: [koronerconfigs]
    verbs: [get, list, watch, create]
  - apiGroups: [koroner.pez.sh]
    resources: [obituaries]
    verbs: [create, get, list, patch, update, watch]
  - apiGroups: [koroner.pez.sh]
    resources: [obituaries/status]
    verbs: [get, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "koroner.fullname" . }}-manager
  labels:
    {{- include "koroner.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "koroner.fullname" . }}-manager
subjects:
  - kind: ServiceAccount
    name: {{ include "koroner.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
---
{{- if .Values.leaderElection.enabled }}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "koroner.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "koroner.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch, delete]
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "koroner.fullname" . }}-leader-election
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "koroner.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "koroner.fullname" . }}-leader-election
subjects:
  - kind: ServiceAccount
    name: {{ include "koroner.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- if .Values.metrics.enabled }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "koroner.fullname" . }}-metrics-auth
  labels:
    {{- include "koroner.labels" . | nindent 4 }}
rules:
  - apiGroups: [authentication.k8s.io]
    resources: [tokenreviews]
    verbs: [create]
  - apiGroups: [authorization.k8s.io]
    resources: [subjectaccessreviews]
    verbs: [create]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "koroner.fullname" . }}-metrics-auth
  labels:
    {{- include "koroner.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "koroner.fullname" . }}-metrics-auth
subjects:
  - kind: ServiceAccount
    name: {{ include "koroner.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}
{{- end }}
