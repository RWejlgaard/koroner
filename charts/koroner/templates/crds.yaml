apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    helm.sh/resource-policy: keep
    controller-gen.kubebuilder.io/version: v0.20.1
  name: koronerconfigs.koroner.pez.sh
spec:
  group: koroner.pez.sh
  names:
    kind: KoronerConfig
    listKind: KoronerConfigList
    plural: koronerconfigs
    singular: koronerconfig
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: KoronerConfig is the Schema for the koronerconfigs API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of KoronerConfig
            properties:
              logTailLines:
                description: |-
                  logTailLines is how many lines of previous-container logs to capture.
                  Defaults to 200.
                format: int32
                minimum: 0
                type: integer
              namespaceSelector:
                description: namespaceSelector limits which namespaces are watched.
                  Empty selects all.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              narrator:
                description: narrator configures optional LLM-backed narrative generation.
                properties:
                  apiKeySecretRef:
                    description: apiKeySecretRef points to the Secret holding the
                      provider API key.
                    properties:
                      key:
                        description: |-
                          key inside the Secret whose value is the API key. Defaults to
                          "ANTHROPIC_API_KEY" or "OPENAI_API_KEY" depending on the provider.
                        type: string
                      name:
                        description: name of the Secret holding the API key.
                        type: string
                      namespace:
                        description: namespace of the Secret. Defaults to the namespace
                          of the dead workload.
                        type: string
                    required:
                    - name
                    type: object
                  baseURL:
                    description: |-
                      baseURL optionally overrides the provider's HTTPS endpoint. Useful for
                      proxies and self-hosted gateways.
                    type: string
                  enabled:
                    description: enabled turns LLM narrative generation on. Defaults
                      to false.
                    type: boolean
                  model:
                    description: |-
                      model is the model identifier passed to the provider, e.g.
                      "claude-opus-4-7" or "gpt-4o-mini".
                    type: string
                  provider:
                    description: provider selects the LLM backend. One of "anthropic",
                      "openai".
                    enum:
                    - anthropic
                    - openai
                    type: string
                type: object
              obituaryRetention:
                description: |-
                  obituaryRetention is how long obituaries are kept before reaping.
                  Defaults to "168h" (7d). Reaper is phase 2.
                type: string
              prometheus:
                description: prometheus configures optional metric evidence.
                properties:
                  enabled:
                    description: enabled turns Prometheus evidence collection on.
                      Defaults to false.
                    type: boolean
                  queries:
                    additionalProperties:
                      type: string
                    description: |-
                      queries optionally overrides the default PromQL templates, keyed by
                      metric label. {{.Pod}}, {{.Namespace}} are substituted.
                    type: object
                  url:
                    description: url is the base address of the Prometheus HTTP API.
                    type: string
                type: object
              restartThreshold:
                description: |-
                  restartThreshold is how many restarts before a crashing container is
                  declared dead. Defaults to 3.
                format: int32
                minimum: 1
                type: integer
              selfHeal:
                description: |-
                  selfHeal configures optional remediation actions Koroner can take when
                  it has diagnosed a recurring, high-confidence death. Off by default.
                properties:
                  actions:
                    description: |-
                      actions is the allowlist of remediations the decider may pick from.
                      Defaults to all four actions when unset.
                    items:
                      description: SelfHealAction names a remediation Koroner is allowed
                        to perform.
                      enum:
                      - DeletePod
                      - RestartWorkload
                      - BumpMemory
                      - RollbackDeployment
                      type: string
                    type: array
                  dryRun:
                    description: |-
                      dryRun records what would be done on the Obituary status without
                      touching the cluster. Defaults to true when SelfHeal is enabled so the
                      first enable is observable, not destructive.
                    type: boolean
                  enabled:
                    description: enabled turns self-heal on. Defaults to false.
                    type: boolean
                  llm:
                    description: |-
                      llm optionally configures an LLM-driven decider. When disabled or
                      misconfigured the engine uses the rule-based map only.
                    properties:
                      apiKeySecretRef:
                        description: apiKeySecretRef points to the Secret holding
                          the provider API key.
                        properties:
                          key:
                            description: |-
                              key inside the Secret whose value is the API key. Defaults to
                              "ANTHROPIC_API_KEY" or "OPENAI_API_KEY" depending on the provider.
                            type: string
                          name:
                            description: name of the Secret holding the API key.
                            type: string
                          namespace:
                            description: namespace of the Secret. Defaults to the
                              namespace of the dead workload.
                            type: string
                        required:
                        - name
                        type: object
                      baseURL:
                        description: baseURL optionally overrides the provider's HTTPS
                          endpoint.
                        type: string
                      enabled:
                        description: enabled turns LLM-driven action selection on.
                          Defaults to false.
                        type: boolean
                      model:
                        description: model is the model identifier passed to the provider.
                        type: string
                      provider:
                        description: provider selects the LLM backend. One of "anthropic",
                          "openai".
                        enum:
                        - anthropic
                        - openai
                        type: string
                    type: object
                  maxHealsPerHour:
                    description: |-
                      maxHealsPerHour caps total heal actions per namespace per hour to
                      prevent runaway loops. Defaults to 5.
                    format: int32
                    minimum: 1
                    type: integer
                  memoryFactor:
                    description: |-
                      memoryFactor is the multiplier applied to a container's memory limit
                      when BumpMemory fires. Defaults to 1.5.
                    type: string
                  memoryMaxLimit:
                    description: |-
                      memoryMaxLimit, when set, is the upper bound BumpMemory will not exceed
                      (e.g. "8Gi"). Optional; no cap when unset.
                    type: string
                  minOccurrences:
                    description: |-
                      minOccurrences is the smallest occurrence count on an Obituary before
                      self-heal will fire. Avoids reacting to one-off flakes. Defaults to 3.
                    format: int32
                    minimum: 1
                    type: integer
                  namespaceSelector:
                    description: |-
                      namespaceSelector limits which namespaces self-heal will act in. Empty
                      matches everything (still subject to KoronerConfigSpec.NamespaceSelector).
                    properties:
                      matchExpressions:
                        description: matchExpressions is a list of label selector
                          requirements. The requirements are ANDed.
                        items:
                          description: |-
                            A label selector requirement is a selector that contains values, a key, and an operator that
                            relates the key and values.
                          properties:
                            key:
                              description: key is the label key that the selector
                                applies to.
                              type: string
                            operator:
                              description: |-
                                operator represents a key's relationship to a set of values.
                                Valid operators are In, NotIn, Exists and DoesNotExist.
                              type: string
                            values:
                              description: |-
                                values is an array of string values. If the operator is In or NotIn,
                                the values array must be non-empty. If the operator is Exists or DoesNotExist,
                                the values array must be empty. This array is replaced during a strategic
                                merge patch.
                              items:
                                type: string
                              type: array
                              x-kubernetes-list-type: atomic
                          required:
                          - key
                          - operator
                          type: object
                        type: array
                        x-kubernetes-list-type: atomic
                      matchLabels:
                        additionalProperties:
                          type: string
                        description: |-
                          matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                          map is equivalent to an element of matchExpressions, whose key field is "key", the
                          operator is "In", and the values array contains only "value". The requirements are ANDed.
                        type: object
                    type: object
                    x-kubernetes-map-type: atomic
                  requireHighConfidence:
                    description: |-
                      requireHighConfidence gates self-heal on a High-confidence verdict.
                      Defaults to true.
                    type: boolean
                type: object
              watch:
                description: watch toggles which death classes are investigated.
                properties:
                  evictions:
                    description: |-
                      evictions covers pods killed by node pressure or preemption.
                      Defaults to false (phase 2).
                    type: boolean
                  jobFailures:
                    description: |-
                      jobFailures covers batch Jobs that exhaust their backoffLimit.
                      Defaults to true.
                    type: boolean
                  podCrashes:
                    description: |-
                      podCrashes covers CrashLoopBackOff, OOMKilled, non-zero exits, and
                      restart-threshold breaches. Defaults to true.
                    type: boolean
                  rolloutFailures:
                    description: |-
                      rolloutFailures covers stuck/failed Deployment & StatefulSet rollouts.
                      Defaults to false (phase 2).
                    type: boolean
                type: object
            type: object
          status:
            description: status defines the observed state of KoronerConfig
            properties:
              conditions:
                description: |-
                  conditions represent the current state of the KoronerConfig resource.
                  Each condition has a unique type and reflects the status of a specific aspect of the resource.

                  Standard condition types include:
                  - "Available": the resource is fully functional
                  - "Progressing": the resource is being created or updated
                  - "Degraded": the resource failed to reach or maintain its desired state

                  The status of each condition is one of True, False, or Unknown.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
---
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    helm.sh/resource-policy: keep
    controller-gen.kubebuilder.io/version: v0.20.1
  name: obituaries.koroner.pez.sh
spec:
  group: koroner.pez.sh
  names:
    kind: Obituary
    listKind: ObituaryList
    plural: obituaries
    shortNames:
    - obit
    singular: obituary
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.causeOfDeath
      name: Cause
      type: string
    - jsonPath: .spec.subject.name
      name: Subject
      type: string
    - jsonPath: .status.occurrences
      name: Occurrences
      type: integer
    - jsonPath: .status.confidence
      name: Confidence
      type: string
    - jsonPath: .status.lastSeen
      name: Last-Seen
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Obituary is the Schema for the obituaries API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Obituary
            properties:
              deathEpisodeKey:
                description: |-
                  deathEpisodeKey deduplicates obituaries: one death episode -> one obituary.
                  Typically "<uid>/<container>/<restartCount>".
                type: string
              subject:
                description: subject is the deceased workload this obituary documents.
                properties:
                  apiVersion:
                    description: apiVersion of the deceased object, e.g. "v1" or "batch/v1".
                    type: string
                  kind:
                    description: kind of the deceased object, e.g. "Pod" or "Job".
                    type: string
                  name:
                    description: name of the deceased object.
                    type: string
                  namespace:
                    description: namespace of the deceased object.
                    type: string
                  uid:
                    description: uid of the deceased object at time of death.
                    type: string
                required:
                - apiVersion
                - kind
                - name
                - namespace
                type: object
              timeOfDeath:
                description: timeOfDeath is when the death was detected.
                format: date-time
                type: string
            required:
            - deathEpisodeKey
            - subject
            type: object
          status:
            description: status defines the observed state of Obituary
            properties:
              causeOfDeath:
                description: causeOfDeath is the heuristic verdict, e.g. "OutOfMemory",
                  "RepeatedCrash".
                type: string
              conditions:
                description: conditions represent the current state of the Obituary
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              confidence:
                description: confidence is how sure the verdict is.
                enum:
                - Low
                - Medium
                - High
                type: string
              eventTimeline:
                description: eventTimeline is the ordered list of relevant Kubernetes
                  events.
                items:
                  description: |-
                    EventRecord is a single entry in the death timeline, distilled from a
                    Kubernetes Event involving the deceased.
                  properties:
                    message:
                      type: string
                    reason:
                      type: string
                    time:
                      format: date-time
                      type: string
                    type:
                      description: type is the Event type, e.g. "Normal" or "Warning".
                      type: string
                  type: object
                type: array
              exitCode:
                description: exitCode of the dead container, when applicable.
                format: int32
                type: integer
              firstSeen:
                description: firstSeen is when this issue was first observed.
                format: date-time
                type: string
              healAttempts:
                description: |-
                  healAttempts is the audit trail of self-heal actions Koroner has
                  considered or applied for this obituary. Empty when self-heal is
                  disabled or has not yet acted.
                items:
                  description: HealRecord is one entry in an Obituary's self-heal
                    audit trail.
                  properties:
                    action:
                      description: action that was selected, e.g. "BumpMemory". Empty
                        when Outcome=Skipped.
                      enum:
                      - DeletePod
                      - RestartWorkload
                      - BumpMemory
                      - RollbackDeployment
                      type: string
                    decidedBy:
                      description: |-
                        decidedBy is "rule" or "llm" identifying the decider that picked the
                        action.
                      type: string
                    detail:
                      description: |-
                        detail is a short human-readable description of what changed, e.g.
                        "memory 512Mi -> 768Mi" or "rolled back to revision 4".
                      type: string
                    outcome:
                      description: outcome is the result of the attempt.
                      enum:
                      - Applied
                      - DryRun
                      - Skipped
                      - Failed
                      type: string
                    reason:
                      description: |-
                        reason explains why this action was chosen (rule-based label or LLM
                        rationale), or why it was skipped/failed.
                      type: string
                    time:
                      description: time the attempt was made.
                      format: date-time
                      type: string
                  type: object
                type: array
              lastEpisode:
                description: |-
                  lastEpisode is an internal discriminator ("<podUID>/<restartCount>") for
                  the most recently counted death, so the same crash isn't counted twice
                  across reconciles.
                type: string
              lastHealAt:
                description: |-
                  lastHealAt is the time of the most recent self-heal attempt regardless
                  of outcome. Useful for filtering recently-acted-on obituaries.
                format: date-time
                type: string
              lastPod:
                description: |-
                  lastPod is the name of the most recent dead pod whose evidence (logs,
                  exit code) is reflected below. Useful when the subject is a workload that
                  recreates pods.
                type: string
              lastSeen:
                description: lastSeen is when this issue was most recently observed.
                format: date-time
                type: string
              logTail:
                description: logTail is the captured tail of the previous container's
                  logs.
                type: string
              metrics:
                description: metrics is an optional Prometheus snapshot around time
                  of death.
                properties:
                  samples:
                    additionalProperties:
                      type: string
                    description: samples maps a metric label (e.g. "memory_bytes")
                      to a human-readable value.
                    type: object
                  source:
                    description: source describes where these numbers came from, e.g.
                      the Prometheus URL.
                    type: string
                type: object
              narrative:
                description: |-
                  narrative is a human-readable post-mortem. Empty in phase 1; reserved for
                  the LLM-backed Narrator.
                type: string
              occurrences:
                description: |-
                  occurrences is how many distinct death episodes have rolled up into this
                  obituary. An obituary represents a known issue - one (workload, container,
                  cause) - so a crash-looping or repeatedly-recreated workload increments
                  this rather than spawning new obituaries.
                format: int32
                type: integer
              oomKilled:
                description: oomKilled is true when the kernel OOM killer was involved.
                type: boolean
              owners:
                description: owners is the deceased's ownership chain.
                items:
                  description: |-
                    OwnerRecord is one hop in the deceased's ownership chain
                    (e.g. Pod -> ReplicaSet -> Deployment).
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    name:
                      type: string
                  type: object
                type: array
              phase:
                description: phase tracks the investigation lifecycle.
                enum:
                - Investigating
                - Complete
                - Failed
                type: string
              restartCount:
                description: restartCount observed at time of death.
                format: int32
                type: integer
              signal:
                description: signal that terminated the container, when applicable.
                format: int32
                type: integer
              summary:
                description: summary is a one-line human-readable cause.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
{{- end }}
