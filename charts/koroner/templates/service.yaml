{{- if .Values.metrics.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "koroner.fullname" . }}-metrics
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "koroner.labels" . | nindent 4 }}
spec:
  type: {{ .Values.metrics.service.type }}
  selector:
    {{- include "koroner.selectorLabels" . | nindent 4 }}
  ports:
    - name: https
      port: {{ .Values.metrics.port }}
      targetPort: metrics
      protocol: TCP
{{- end }}
