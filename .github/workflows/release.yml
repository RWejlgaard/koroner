name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      released: ${{ steps.bump.outputs.released }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Determine next version from conventional commit
        id: bump
        run: |
          set -euo pipefail

          subject="$(git log -1 --pretty=%s)"
          echo "Commit subject: $subject"

          latest_tag="$(git tag --list 'v*' --sort=-v:refname | head -n1 || true)"
          if [ -z "$latest_tag" ]; then
            latest_tag="v0.0.0"
          fi
          echo "Latest tag: $latest_tag"

          ver="${latest_tag#v}"
          major="${ver%%.*}"
          rest="${ver#*.}"
          minor="${rest%%.*}"
          patch="${rest#*.}"

          type="$(printf '%s' "$subject" | sed -nE 's/^([a-zA-Z]+)(\([^)]+\))?:.*/\1/p')"
          case "$type" in
            major) bump="major" ;;
            feat)  bump="minor" ;;
            fix)   bump="patch" ;;
            *)     bump="none" ;;
          esac
          echo "Bump: $bump"

          if [ "$bump" = "none" ]; then
            echo "No release-worthy commit. Skipping."
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          case "$bump" in
            major) major=$((major+1)); minor=0; patch=0 ;;
            minor) minor=$((minor+1)); patch=0 ;;
            patch) patch=$((patch+1)) ;;
          esac

          new_version="v${major}.${minor}.${patch}"
          echo "New version: $new_version"
          echo "version=$new_version" >> "$GITHUB_OUTPUT"
          echo "released=true" >> "$GITHUB_OUTPUT"

      - name: Tag commit
        if: steps.bump.outputs.released == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.bump.outputs.version }}" -m "${{ steps.bump.outputs.version }}"
          git push origin "${{ steps.bump.outputs.version }}"

      - name: Create GitHub release
        if: steps.bump.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.bump.outputs.version }}" \
            --title "${{ steps.bump.outputs.version }}" \
            --generate-notes

  docker:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.release.outputs.version }}

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            rwejlgaard/koroner:${{ needs.release.outputs.version }}
            rwejlgaard/koroner:latest
