# This rule is not used by the project koroner itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants permissions to create, update, and delete resources within the koroner.pez.sh.
# This role is intended for users who need to manage these resources
# but should not control RBAC or manage permissions for others.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: koroner
    app.kubernetes.io/managed-by: kustomize
  name: koronerconfig-editor-role
rules:
- apiGroups:
  - koroner.pez.sh
  resources:
  - koronerconfigs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - koroner.pez.sh
  resources:
  - koronerconfigs/status
  verbs:
  - get
