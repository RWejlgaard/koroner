apiVersion: koroner.pez.sh/v1alpha1
kind: KoronerConfig
metadata:
  labels:
    app.kubernetes.io/name: koroner
    app.kubernetes.io/managed-by: kustomize
  name: default
spec:
  watch:
    podCrashes: true
    jobFailures: true
    rolloutFailures: false
    evictions: false
  restartThreshold: 3
  logTailLines: 200
  obituaryRetention: 168h
  prometheus:
    enabled: false
    # url: http://prometheus-operated.monitoring:9090
  narrator:
    enabled: false
    # provider: anthropic            # or "openai"
    # model: claude-opus-4-7         # or e.g. "gpt-4o-mini"
    # apiKeySecretRef:
    #   name: koroner-llm
    #   key: ANTHROPIC_API_KEY       # defaults to ANTHROPIC_API_KEY / OPENAI_API_KEY
    #   namespace: koroner-system    # defaults to the dead workload's namespace
    # baseURL: https://api.anthropic.com
