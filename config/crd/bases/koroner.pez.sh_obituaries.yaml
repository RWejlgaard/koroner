---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: obituaries.koroner.pez.sh
spec:
  group: koroner.pez.sh
  names:
    kind: Obituary
    listKind: ObituaryList
    plural: obituaries
    shortNames:
    - obit
    singular: obituary
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.causeOfDeath
      name: Cause
      type: string
    - jsonPath: .spec.subject.name
      name: Subject
      type: string
    - jsonPath: .status.occurrences
      name: Occurrences
      type: integer
    - jsonPath: .status.confidence
      name: Confidence
      type: string
    - jsonPath: .status.lastSeen
      name: Last-Seen
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Obituary is the Schema for the obituaries API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Obituary
            properties:
              deathEpisodeKey:
                description: |-
                  deathEpisodeKey deduplicates obituaries: one death episode -> one obituary.
                  Typically "<uid>/<container>/<restartCount>".
                type: string
              subject:
                description: subject is the deceased workload this obituary documents.
                properties:
                  apiVersion:
                    description: apiVersion of the deceased object, e.g. "v1" or "batch/v1".
                    type: string
                  kind:
                    description: kind of the deceased object, e.g. "Pod" or "Job".
                    type: string
                  name:
                    description: name of the deceased object.
                    type: string
                  namespace:
                    description: namespace of the deceased object.
                    type: string
                  uid:
                    description: uid of the deceased object at time of death.
                    type: string
                required:
                - apiVersion
                - kind
                - name
                - namespace
                type: object
              timeOfDeath:
                description: timeOfDeath is when the death was detected.
                format: date-time
                type: string
            required:
            - deathEpisodeKey
            - subject
            type: object
          status:
            description: status defines the observed state of Obituary
            properties:
              causeOfDeath:
                description: causeOfDeath is the heuristic verdict, e.g. "OutOfMemory",
                  "RepeatedCrash".
                type: string
              conditions:
                description: conditions represent the current state of the Obituary
                  resource.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              confidence:
                description: confidence is how sure the verdict is.
                enum:
                - Low
                - Medium
                - High
                type: string
              eventTimeline:
                description: eventTimeline is the ordered list of relevant Kubernetes
                  events.
                items:
                  description: |-
                    EventRecord is a single entry in the death timeline, distilled from a
                    Kubernetes Event involving the deceased.
                  properties:
                    message:
                      type: string
                    reason:
                      type: string
                    time:
                      format: date-time
                      type: string
                    type:
                      description: type is the Event type, e.g. "Normal" or "Warning".
                      type: string
                  type: object
                type: array
              exitCode:
                description: exitCode of the dead container, when applicable.
                format: int32
                type: integer
              firstSeen:
                description: firstSeen is when this issue was first observed.
                format: date-time
                type: string
              lastEpisode:
                description: |-
                  lastEpisode is an internal discriminator ("<podUID>/<restartCount>") for
                  the most recently counted death, so the same crash isn't counted twice
                  across reconciles.
                type: string
              lastPod:
                description: |-
                  lastPod is the name of the most recent dead pod whose evidence (logs,
                  exit code) is reflected below. Useful when the subject is a workload that
                  recreates pods.
                type: string
              lastSeen:
                description: lastSeen is when this issue was most recently observed.
                format: date-time
                type: string
              logTail:
                description: logTail is the captured tail of the previous container's
                  logs.
                type: string
              metrics:
                description: metrics is an optional Prometheus snapshot around time
                  of death.
                properties:
                  samples:
                    additionalProperties:
                      type: string
                    description: samples maps a metric label (e.g. "memory_bytes")
                      to a human-readable value.
                    type: object
                  source:
                    description: source describes where these numbers came from, e.g.
                      the Prometheus URL.
                    type: string
                type: object
              narrative:
                description: |-
                  narrative is a human-readable post-mortem. Empty in phase 1; reserved for
                  the LLM-backed Narrator.
                type: string
              occurrences:
                description: |-
                  occurrences is how many distinct death episodes have rolled up into this
                  obituary. An obituary represents a known issue - one (workload, container,
                  cause) - so a crash-looping or repeatedly-recreated workload increments
                  this rather than spawning new obituaries.
                format: int32
                type: integer
              oomKilled:
                description: oomKilled is true when the kernel OOM killer was involved.
                type: boolean
              owners:
                description: owners is the deceased's ownership chain.
                items:
                  description: |-
                    OwnerRecord is one hop in the deceased's ownership chain
                    (e.g. Pod -> ReplicaSet -> Deployment).
                  properties:
                    apiVersion:
                      type: string
                    kind:
                      type: string
                    name:
                      type: string
                  type: object
                type: array
              phase:
                description: phase tracks the investigation lifecycle.
                enum:
                - Investigating
                - Complete
                - Failed
                type: string
              restartCount:
                description: restartCount observed at time of death.
                format: int32
                type: integer
              signal:
                description: signal that terminated the container, when applicable.
                format: int32
                type: integer
              summary:
                description: summary is a one-line human-readable cause.
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
