# A pod that exits non-zero immediately and crash-loops. Expect an Obituary
# with causeOfDeath=ApplicationError, then RepeatedCrash once CrashLoopBackOff
# sets in.
apiVersion: v1
kind: Pod
metadata:
  name: koroner-crashloop
  labels:
    koroner.pez.sh/demo: "true"
spec:
  restartPolicy: Always
  containers:
    - name: faily
      image: busybox
      command: ["sh", "-c", "echo 'starting up'; sleep 2; echo 'fatal: kaboom' >&2; exit 1"]
