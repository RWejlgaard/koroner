# A pod guaranteed to be OOMKilled: a tiny memory limit and a process that
# allocates far past it. Expect an Obituary with causeOfDeath=OutOfMemory.
apiVersion: v1
kind: Pod
metadata:
  name: koroner-oom
  labels:
    koroner.pez.sh/demo: "true"
spec:
  restartPolicy: Never
  containers:
    - name: hog
      image: polinux/stress
      resources:
        limits:
          memory: "16Mi"
        requests:
          memory: "16Mi"
      command: ["stress"]
      args: ["--vm", "1", "--vm-bytes", "256M", "--vm-hang", "0"]
